name: Convex → Abstract Migration Agent

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repo (org/name) — the Convex app"
        required: true
        default: "gherghelejiu/now-what"
      target_repo:
        description: "Target repo (org/name) — where abstracted code is pushed"
        required: true
        default: "gherghelejiu/now-what-abstract"
      dry_run:
        description: "Dry run (analyse + show checkpoint state, no writes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  migrate:
    name: Run Migration Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout this workflow repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests gitpython

      - name: Configure Git identity
        run: |
          git config --global user.email "migration-agent@github-actions"
          git config --global user.name "Migration Agent"

      - name: Clone source repo (now-what)
        run: |
          git clone https://x-access-token:${{ secrets.SOURCE_GITHUB_TOKEN }}@github.com/${{ github.event.inputs.source_repo }}.git source_repo

      - name: Clone target repo (now-what-abstract)
        run: |
          git clone https://x-access-token:${{ secrets.TARGET_GITHUB_TOKEN }}@github.com/${{ github.event.inputs.target_repo }}.git target_repo || \
          (mkdir target_repo && cd target_repo && git init && git remote add origin https://x-access-token:${{ secrets.TARGET_GITHUB_TOKEN }}@github.com/${{ github.event.inputs.target_repo }}.git)

      - name: Run migration agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
        run: |
          python convex-abstract-agent.py --source ./source_repo --target ./target_repo --dry-run ${{ github.event.inputs.dry_run }}

      - name: Commit and push to target repo
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          TARGET_GITHUB_TOKEN: ${{ secrets.TARGET_GITHUB_TOKEN }}
        run: |
          cd target_repo
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: migrate from Convex to Abstract

          Automated migration by convex-to-abstract agent
          Source: https://github.com/${{ github.event.inputs.source_repo }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push --force origin HEAD:main

      - name: Upload migration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-report
          path: migration_report.md
          retention-days: 30